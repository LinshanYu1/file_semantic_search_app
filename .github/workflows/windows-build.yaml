name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          architecture: "x64"

      - name: Install Python dependencies
        run: |
          python --version
          python -m pip install --upgrade "pip<25"
          pip install -r requirements-legacy-win7.txt
          python -m pip freeze

      - name: Build app with PyInstaller
        run: pyinstaller --clean SemanticFileSearch.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppOutputBaseFilename=SemanticFileSearchSetup-Win7 installer.iss'

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: SemanticFileSearch-portable
          path: dist/SemanticFileSearch

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SemanticFileSearch-installer-win7
          path: installer/SemanticFileSearchSetup-Win7.exe
