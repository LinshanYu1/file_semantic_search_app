name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app with PyInstaller
        run: pyinstaller --clean SemanticFileSearch.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        run: iscc installer.iss

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: SemanticFileSearch-portable
          path: dist/SemanticFileSearch

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SemanticFileSearch-installer
          path: installer/SemanticFileSearchSetup.exe
